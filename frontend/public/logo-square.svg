<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="squareGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="50%" stop-color="#9333EA" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#squareGradient)" />
  
  <!-- Decorative Elements -->
  <circle cx="48" cy="56" r="12" fill="white" opacity="0.15" />
  <circle cx="208" cy="56" r="8" fill="white" opacity="0.1" />
  <circle cx="208" cy="200" r="12" fill="white" opacity="0.12" />
  
  <!-- Main Document -->
  <g filter="url(#shadow)">
    <path d="M85 45 L155 45 L175 65 L175 211 L85 211 Z" fill="white" />
    
    <!-- Folded Corner -->
    <path d="M155 45 L155 65 L175 65" fill="#E5E7EB" />
    
    <!-- PDF Lines -->
    <rect x="105" y="85" width="50" height="8" rx="4" fill="#D1D5DB" />
    <rect x="105" y="105" width="50" height="8" rx="4" fill="#D1D5DB" />
    <rect x="105" y="125" width="40" height="8" rx="4" fill="#D1D5DB" />
    <rect x="105" y="145" width="45" height="8" rx="4" fill="#D1D5DB" />
    <rect x="105" y="165" width="35" height="8" rx="4" fill="#D1D5DB" />
    
    <!-- PDF Badge -->
    <rect x="102" y="178" width="56" height="26" rx="6" fill="url(#squareGradient)" />
    <text x="130" y="196" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">PDF</text>
  </g>
</svg>