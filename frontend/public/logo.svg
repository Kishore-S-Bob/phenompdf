<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <!-- Main Gradient -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="50%" stop-color="#9333EA" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
    
    <!-- Subtle Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background (optional, for standalone use) -->
  <rect width="400" height="120" fill="transparent" />

  <!-- Logo Icon Group -->
  <g filter="url(#shadow)">
    <!-- Main Document Shape -->
    <path d="M50 15 L85 15 L95 25 L95 105 L50 105 Z" fill="url(#logoGradient)" />
    
    <!-- Folded Corner -->
    <path d="M85 15 L85 25 L95 25" fill="#1E40AF" opacity="0.6" />
    
    <!-- PDF Text Lines (White) -->
    <rect x="60" y="40" width="25" height="4" rx="2" fill="white" opacity="0.95" />
    <rect x="60" y="50" width="25" height="4" rx="2" fill="white" opacity="0.95" />
    <rect x="60" y="60" width="20" height="4" rx="2" fill="white" opacity="0.95" />
    <rect x="60" y="70" width="23" height="4" rx="2" fill="white" opacity="0.95" />
    
    <!-- "PDF" Badge -->
    <rect x="58" y="82" width="29" height="14" rx="3" fill="white" />
    <text x="72.5" y="92.5" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="url(#logoGradient)" text-anchor="middle">PDF</text>
    
    <!-- Sparkle Accents -->
    <circle cx="45" cy="25" r="2" fill="#9333EA" opacity="0.6" />
    <circle cx="100" cy="15" r="1.5" fill="#2563EB" opacity="0.5" />
    <circle cx="102" cy="108" r="2" fill="#4F46E5" opacity="0.4" />
  </g>

  <!-- PhenomPDF Text -->
  <text x="115" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="url(#logoGradient)" filter="url(#glow)">
    Phenom<tspan font-weight="400">PDF</tspan>
  </text>

  <!-- Tagline -->
  <text x="115" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#6B7280">
    Professional PDF Toolkit
  </text>
</svg>