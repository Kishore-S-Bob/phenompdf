<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <defs>
    <!-- Enhanced Multi-stop Gradient -->
    <linearGradient id="largeLogoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="25%" stop-color="#7C3AED" />
      <stop offset="50%" stop-color="#9333EA" />
      <stop offset="75%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
    
    <!-- Soft Glow Effect -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Enhanced Shadow -->
    <filter id="enhancedShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="4" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background (optional, for standalone use) -->
  <rect width="600" height="200" fill="transparent" />

  <!-- Logo Icon Group -->
  <g filter="url(#enhancedShadow)">
    <!-- Main Document Shape -->
    <path d="M60 15 L110 15 L130 35 L130 185 L60 185 Z" fill="url(#largeLogoGradient)" />
    
    <!-- Folded Corner with Gradient -->
    <path d="M110 15 L110 35 L130 35" fill="#1E40AF" opacity="0.7" />
    
    <!-- PDF Text Lines (White with varying opacity) -->
    <rect x="80" y="55" width="40" height="5" rx="2.5" fill="white" opacity="1" />
    <rect x="80" y="70" width="40" height="5" rx="2.5" fill="white" opacity="1" />
    <rect x="80" y="85" width="30" height="5" rx="2.5" fill="white" opacity="0.95" />
    <rect x="80" y="100" width="35" height="5" rx="2.5" fill="white" opacity="0.95" />
    <rect x="80" y="115" width="38" height="5" rx="2.5" fill="white" opacity="0.9" />
    <rect x="80" y="130" width="32" height="5" rx="2.5" fill="white" opacity="0.9" />
    
    <!-- "PDF" Badge -->
    <rect x="75" y="145" width="40" height="22" rx="4" fill="white" />
    <text x="95" y="161" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="url(#largeLogoGradient)" text-anchor="middle">PDF</text>
    
    <!-- Decorative Sparkles -->
    <circle cx="50" cy="35" r="3" fill="#9333EA" opacity="0.5" />
    <circle cx="140" cy="25" r="2" fill="#2563EB" opacity="0.4" />
    <circle cx="145" cy="190" r="3" fill="#4F46E5" opacity="0.3" />
    <circle cx="55" cy="180" r="2" fill="#7C3AED" opacity="0.4" />
  </g>

  <!-- PhenomPDF Text with Glow -->
  <text x="160" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="800" fill="url(#largeLogoGradient)" filter="url(#softGlow)">
    Phenom<tspan font-weight="400" fill-opacity="0.9">PDF</tspan>
  </text>

  <!-- Enhanced Tagline -->
  <text x="160" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#6B7280" letter-spacing="0.5">
    Professional PDF Toolkit
  </text>
</svg>